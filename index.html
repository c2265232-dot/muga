<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Games Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #121212;
      color: white;
    }
    header {
      padding: 10px;
      background: #1e1e1e;
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      padding: 10px;
    }
    .game {
      background: #1e1e1e;
      padding: 10px;
      border-radius: 10px;
    }
    iframe {
      width: 100%;
      height: 150px;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header>
  <input type="text" id="search" placeholder="Search games...">
  <button onclick="showFavorites()">⭐ Favorites</button>
  <button onclick="showAll()">All Games</button>
</header>

<div class="games" id="games"></div>

<script>
const games = [
  { name: "Slope", url: "https://ubg100.github.io/games/slope/" },
  { name: "Run 3", url: "https://ubg100.github.io/games/run3/" },
  { name: "1v1.LOL", url: "https://1v1.lol/" },
  { name: "Shell Shockers", url: "https://shellshock.io/" }
];

let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

function render(list) {
  const container = document.getElementById("games");
  container.innerHTML = "";

  list.forEach(game => {
    const div = document.createElement("div");
    div.className = "game";

    const fav = favorites.includes(game.name);

    div.innerHTML = `
      <h3>${game.name}</h3>
      <iframe src="${game.url}"></iframe>
      <button onclick="toggleFavorite('${game.name}')">
        ${fav ? "★ Favorited" : "☆ Favorite"}
      </button>
    `;

    container.appendChild(div);
  });
}

function toggleFavorite(name) {
  if (favorites.includes(name)) {
    favorites = favorites.filter(f => f !== name);
  } else {
    favorites.push(name);
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  render(games);
}

function showFavorites() {
  render(games.filter(g => favorites.includes(g.name)));
}

function showAll() {
  render(games);
}

document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();
  render(games.filter(g => g.name.toLowerCase().includes(value)));
});

render(games);
</script>

</body>
</html>
